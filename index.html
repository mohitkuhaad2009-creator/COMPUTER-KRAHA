<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Kraha - Ultimate Tracker</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background: #eef2f7; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; padding: 15px; background: var(--light); border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-save { background: var(--success); width: 100%; margin-top: 18px; }
        .btn-edit { background: var(--warning); color: #000; padding: 5px 8px; font-size: 12px; }
        .btn-del { background: var(--danger); padding: 5px 8px; font-size: 12px; }
        .btn-ok { font-size: 11px; padding: 5px 10px; min-width: 60px; }
        
        .row-done { background-color: #d4edda !important; }
        .expense-row { background-color: #fff5f5 !important; border-left: 5px solid var(--danger); }
        
        .filter-section { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-box { flex: 2; min-width: 200px; }
        .search-box input { width: 100%; padding: 10px; border: 2px solid var(--primary); border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .type-filter { flex: 1; min-width: 150px; }
        .type-filter select { padding: 10px; border: 2px solid var(--primary); border-radius: 6px; font-weight: bold; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; z-index: 10; }

        .summary-bar { margin-top: 20px; padding: 15px; background: var(--dark); color: white; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; flex-wrap: wrap; gap: 10px; }
        .total-val { font-weight: bold; }
        .val-in { color: #50fa7b; }
        .val-out { color: #ff6b6b; }
        
        #statusMsg { text-align: center; color: var(--primary); font-weight: bold; padding: 5px; display: none; }
        @media print { .input-group, .filter-section, .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="input-group">
        <input type="hidden" id="rowId">
        <div>
            <label>Category</label>
            <select id="category" onchange="toggleFields()">
                <option value="INCOME">INCOME (Kamayi)</option>
                <option value="EXPENSE">EXPENSE (Kharcha)</option>
            </select>
        </div>
        <div><label>Name/Detail</label><input type="text" id="name" placeholder="Customer or Reason"></div>
        <div id="mobileDiv"><label>Mobile</label><input type="text" id="mobile"></div>
        <div id="villageDiv"><label>Village</label><input type="text" id="village"></div>
        <div><label>Date</label><input type="date" id="date"></div>
        <div class="time-field"><label>Start</label><input type="time" id="timeStart"></div>
        <div class="time-field"><label>Close</label><input type="time" id="timeClose"></div>
        <div><label>Amount (₹)</label><input type="number" id="amount"></div>
        <button onclick="saveData()" id="mainBtn" class="btn btn-save">Save & Sync</button>
    </div>

    <div class="filter-section">
        <div class="search-box">
            <input type="text" id="filterInput" onkeyup="filterTable()" placeholder="🔍 Search Name, Village, Mobile...">
        </div>
        <div class="type-filter">
            <select id="typeFilter" onchange="filterTable()">
                <option value="ALL">Show ALL Entries</option>
                <option value="INCOME">INCOME ONLY</option>
                <option value="EXPENSE">EXPENSE ONLY</option>
            </select>
        </div>
    </div>

    <div id="statusMsg">Syncing with Cloud...</div>

    <table id="dataTable">
        <thead>
            <tr>
                <th class="no-print">OK</th>
                <th>Type</th>
                <th>Name/Detail</th>
                <th>Mobile</th>
                <th>Village</th>
                <th>Date</th>
                <th>Start</th>
                <th>Close</th>
                <th>Duration</th>
                <th>Amount</th>
                <th class="no-print">Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="summary-bar">
        <div>Total Income: <span class="total-val val-in">₹<span id="grandTotalIn">0.00</span></span></div>
        <div>Total Expense: <span class="total-val val-out">₹<span id="grandTotalOut">0.00</span></span></div>
        <div>Net Profit: <span class="total-val">₹<span id="netProfit">0.00</span></span></div>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbw44bAFbp9SL-Z_tuMwxUwCDgGUE7MqBHp-qbBsUvXYUnWE0sEoSQO9yBynUnn_xTl1/exec";
    let allData = [];

    window.onload = fetchHistory;

    function toggleFields() {
        let isExp = document.getElementById('category').value === 'EXPENSE';
        document.getElementById('mobileDiv').style.display = isExp ? 'none' : 'block';
        document.getElementById('villageDiv').style.display = isExp ? 'none' : 'block';
        document.querySelectorAll('.time-field').forEach(f => f.style.display = isExp ? 'none' : 'block');
    }

    async function fetchHistory() {
        document.getElementById('statusMsg').style.display = "block";
        try {
            const res = await fetch(GOOGLE_URL);
            allData = await res.json();
            renderTable();
            document.getElementById('statusMsg').style.display = "none";
        } catch (err) { alert("Sheet Connection Error!"); }
    }

    function renderTable() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        allData.slice().reverse().forEach((item, index) => {
            const isDone = item.status === "DONE";
            const isExp = item.category === "EXPENSE";
            const row = tbody.insertRow();
            if(isDone) row.classList.add('row-done');
            if(isExp) row.classList.add('expense-row');

            row.innerHTML = `
                <td class="no-print">
                    <button class="btn btn-ok" style="background:${isDone?'#28a745':'#6c757d'}" onclick="updateStatusCloud(${item.rowId},'${item.status}')">${isDone?'DONE':'OK'}</button>
                </td>
                <td><small><b>${item.category || 'INCOME'}</b></small></td>
                <td>${item.name}</td>
                <td>${item.mobile || '-'}</td>
                <td>${item.village || '-'}</td>
                <td>${item.date}</td>
                <td>${item.timeStart || '-'}</td>
                <td>${item.timeClose || '-'}</td>
                <td>${item.duration || '-'}</td>
                <td style="color:${isExp?'red':'green'}; font-weight:bold">${parseFloat(item.amount).toFixed(2)}</td>
                <td class="no-print">
                    <button class="btn btn-edit" onclick="editEntry(${allData.length - 1 - index})">Edit</button>
                    <button class="btn btn-del" onclick="deleteEntry(${item.rowId})">Del</button>
                </td>`;
        });
        filterTable(); // Refresh totals on load
    }

    function filterTable() {
        let searchText = document.getElementById("filterInput").value.toUpperCase();
        let selectedCat = document.getElementById("typeFilter").value.toUpperCase();
        let tr = document.getElementById("dataTable").getElementsByTagName("tr");
        let tIn = 0, tOut = 0;

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].innerText.toUpperCase();
            let rowCategory = tr[i].cells[1].innerText.toUpperCase();
            let matchesSearch = rowText.includes(searchText);
            let matchesCat = (selectedCat === "ALL" || rowCategory.includes(selectedCat));

            if (matchesSearch && matchesCat) {
                tr[i].style.display = "";
                let amt = parseFloat(tr[i].cells[9].innerText) || 0;
                if (rowCategory.includes("EXPENSE")) tOut += amt; else tIn += amt;
            } else {
                tr[i].style.display = "none";
            }
        }
        document.getElementById('grandTotalIn').innerText = tIn.toFixed(2);
        document.getElementById('grandTotalOut').innerText = tOut.toFixed(2);
        document.getElementById('netProfit').innerText = (tIn - tOut).toFixed(2);
    }

    async function saveData() {
        const rowId = document.getElementById('rowId').value;
        const cat = document.getElementById('category').value;
        const sTime = document.getElementById('timeStart').value;
        const cTime = document.getElementById('timeClose').value;

        const entry = {
            action: rowId ? "edit" : "add",
            rowId: rowId,
            category: cat,
            name: document.getElementById('name').value,
            mobile: document.getElementById('mobile').value,
            village: document.getElementById('village').value,
            date: document.getElementById('date').value,
            timeStart: (cat==='EXPENSE') ? "-" : sTime,
            timeClose: (cat==='EXPENSE') ? "-" : cTime,
            amount: document.getElementById('amount').value,
            duration: (function(s,e){
                if(cat==='EXPENSE' || !s || !e) return "-";
                let diff = new Date("2000/01/01 "+e) - new Date("2000/01/01 "+s);
                if(diff<0) diff+=86400000;
                return Math.floor(diff/3600000)+"h "+Math.floor((diff%3600000)/60000)+"m";
            })(sTime, cTime)
        };

        if(!entry.name || !entry.amount) return alert("Please fill Name and Amount!");
        document.getElementById('mainBtn').innerText = "Syncing...";
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        location.reload();
    }

    function editEntry(idx) {
        const item = allData[idx];
        document.getElementById('rowId').value = item.rowId;
        document.getElementById('category').value = item.category || 'INCOME';
        document.getElementById('name').value = item.name;
        document.getElementById('mobile').value = item.mobile || "";
        document.getElementById('village').value = item.village || "";
        document.getElementById('date').value = item.date;
        document.getElementById('timeStart').value = (item.timeStart === "-") ? "" : item.timeStart;
        document.getElementById('timeClose').value = (item.timeClose === "-") ? "" : item.timeClose;
        document.getElementById('amount').value = item.amount;
        toggleFields();
        document.getElementById('mainBtn').innerText = "Update Now";
        window.scrollTo(0,0);
    }

    async function updateStatusCloud(id, current) {
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "status_update", rowId: id, status: (current==="DONE"?"PENDING":"DONE")}) });
        fetchHistory();
    }

    async function deleteEntry(id) {
        if(confirm("Delete Permanently?")) {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "delete", rowId: id}) });
            location.reload();
        }
    }
</script>
</body>
</html>
