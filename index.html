<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Kraha - Advanced Tracker</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 15px; background: #eef2f7; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Form Styling */
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; padding: 20px; background: var(--light); border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-save { background: var(--success); width: 100%; margin-top: 22px; }
        .btn-edit { background: var(--warning); color: #000; padding: 5px 10px; margin-right: 5px; }
        .btn-del { background: var(--danger); padding: 5px 10px; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f9f9f9; }

        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--dark); padding: 10px 0; margin-top: 20px; }
        .stats-badge { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        
        .tick-col { width: 40px; text-align: center; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        
        .summary-bar { margin-top: 20px; padding: 15px; background: var(--dark); color: white; border-radius: 8px; text-align: right; font-size: 1.2rem; }
        .total-val { color: #50fa7b; font-weight: bold; }
        
        @media print { .input-group, .actions, .btn-print, .no-print, .btn-edit, .btn-del { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Entry Panel</h2>
    
    <div class="input-group">
        <input type="hidden" id="rowId">
        <div><label>Name</label><input type="text" id="name" placeholder="Name"></div>
        <div><label>Mobile</label><input type="text" id="mobile" placeholder="Mobile"></div>
        <div><label>Village</label><input type="text" id="village" placeholder="Village"></div>
        <div><label>Date</label><input type="date" id="date"></div>
        <div><label>Start</label><input type="time" id="timeStart"></div>
        <div><label>Close</label><input type="time" id="timeClose"></div>
        <div><label>Amount (₹)</label><input type="number" id="amount" placeholder="0.00"></div>
        <button onclick="saveData()" id="mainBtn" class="btn btn-save">Save Entry</button>
    </div>

    <div class="history-header">
        <h3>Cloud History</h3>
        <div class="stats-badge">Total Entries: <span id="entryCount">0</span></div>
    </div>

    <div id="statusMsg" style="text-align: center; color: var(--primary); font-weight: bold; padding: 10px;">Loading data...</div>

    <table id="dataTable">
        <thead>
            <tr>
                <th class="tick-col">✓</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>Village</th>
                <th>Date</th>
                <th>Start</th>
                <th>Close</th>
                <th>Duration</th>
                <th>Amount</th>
                <th class="no-print">Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="summary-bar">
        Grand Total: <span class="total-val">₹<span id="grandTotal">0.00</span></span>
    </div>
</div>

<script>
    // Aapka Update kiya hua URL
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyftBpoYoGk8OB-TEcQr_umHlw_qlpg0AWP8HXLT-NUICCiEKQWeSLUt9ngtOJ3TZGN/exec";
    let allData = [];

    window.onload = fetchHistory;

    function calculateDuration(s, e) {
        if (!s || !e) return "0h 0m";
        let start = new Date("2000/01/01 " + s);
        let end = new Date("2000/01/01 " + e);
        let diff = end - start;
        if (diff < 0) diff += 86400000;
        return Math.floor(diff/3600000) + "h " + Math.floor((diff%3600000)/60000) + "m";
    }

    async function fetchHistory() {
        const status = document.getElementById('statusMsg');
        status.style.display = "block";
        try {
            const res = await fetch(GOOGLE_URL);
            allData = await res.json();
            renderTable();
            status.style.display = "none";
        } catch (err) {
            status.innerText = "Error loading data. Check Internet.";
        }
    }

    function renderTable() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        let total = 0;
        
        // Reverse isliye kiya taaki nayi entry upar dikhe
        allData.reverse().forEach((item, index) => {
            total += parseFloat(item.amount) || 0;
            const row = tbody.insertRow();
            row.innerHTML = `
                <td class="tick-col"><input type="checkbox"></td>
                <td>${item.name}</td>
                <td>${item.mobile}</td>
                <td>${item.village}</td>
                <td>${item.date.split('T')[0]}</td>
                <td>${item.timeStart}</td>
                <td>${item.timeClose}</td>
                <td>${item.duration}</td>
                <td>${parseFloat(item.amount).toFixed(2)}</td>
                <td class="no-print">
                    <button class="btn btn-edit" onclick="editEntry(${allData.length - 1 - index})">Edit</button>
                    <button class="btn btn-del" onclick="deleteEntry(${item.rowId})">Del</button>
                </td>`;
        });
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        document.getElementById('entryCount').innerText = allData.length;
    }

    async function saveData() {
        const mainBtn = document.getElementById('mainBtn');
        const rowId = document.getElementById('rowId').value;
        
        const entry = {
            action: rowId ? "edit" : "add",
            rowId: rowId,
            name: document.getElementById('name').value,
            mobile: document.getElementById('mobile').value,
            village: document.getElementById('village').value,
            date: document.getElementById('date').value,
            timeStart: document.getElementById('timeStart').value,
            timeClose: document.getElementById('timeClose').value,
            amount: document.getElementById('amount').value,
            duration: calculateDuration(document.getElementById('timeStart').value, document.getElementById('timeClose').value)
        };

        if (!entry.name || !entry.amount) return alert("Fill Name and Amount!");

        mainBtn.innerText = "Processing Cloud...";
        mainBtn.disabled = true;

        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        
        // Data save hone ke baad page refresh
        location.reload();
    }

    function editEntry(originalIndex) {
        const item = allData[originalIndex];
        document.getElementById('rowId').value = item.rowId;
        document.getElementById('name').value = item.name;
        document.getElementById('mobile').value = item.mobile;
        document.getElementById('village').value = item.village;
        document.getElementById('date').value = item.date.split('T')[0];
        document.getElementById('timeStart').value = item.timeStart;
        document.getElementById('timeClose').value = item.timeClose;
        document.getElementById('amount').value = item.amount;
        
        document.getElementById('mainBtn').innerText = "Update Cloud Row";
        document.getElementById('mainBtn').style.background = "var(--primary)";
        window.scrollTo(0,0);
    }

    async function deleteEntry(id) {
        if(confirm("Kya aap sach mein ise hamesha ke liye mitaana chahte hain?")) {
            document.getElementById('statusMsg').innerText = "Deleting...";
            document.getElementById('statusMsg').style.display = "block";
            await fetch(GOOGLE_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({action: "delete", rowId: id}) 
            });
            location.reload();
        }
    }
</script>

</body>
</html>
