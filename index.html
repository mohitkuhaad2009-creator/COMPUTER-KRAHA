<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Kraha - Ultimate Tracker</title>
    <style>
        :root { 
            --primary: #007bff; 
            --success: #28a745; 
            --warning: #ffc107; 
            --danger: #dc3545; 
            --dark: #343a40; 
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #eef2f7; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Print logic: Hides everything except the table and total */
        @media print {
            .input-group, .filter-section, .actions, .btn-print, h2, .no-print { display: none !important; }
            body { background: white; margin: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; border: none; }
            table { width: 100%; border: 1px solid #000; font-size: 12px; }
            th, td { border: 1px solid #000 !important; padding: 8px; }
            .summary-bar { background: #333 !important; color: white !important; -webkit-print-color-adjust: exact; margin-top: 10px; }
        }

        h2 { text-align: center; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        
        /* Layout for Inputs */
        .input-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; margin-bottom: 20px; padding: 20px; background: var(--light); border-radius: 8px; border: 1px solid #ddd;
        }
        label { font-size: 0.8rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn-main { background: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 22px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; }

        .btn-print { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .btn-print:hover { background: #000; }

        .filter-section { margin: 20px 0; display: flex; align-items: center; gap: 10px; padding: 10px; background: #fff; border-radius: 5px; border: 1px solid #eee; }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background: var(--primary); color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        
        .summary-bar { margin-top: 20px; padding: 15px; background: var(--dark); color: white; border-radius: 8px; text-align: right; font-size: 1.3rem; }
        .grand-total { font-weight: bold; color: #50fa7b; margin-left: 10px; }

        .actions { display: flex; gap: 5px; }
        .btn-edit { background: var(--warning); border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Project Tracker & Records</h2>

    <button onclick="window.print()" class="btn-print">⎙ Print Table</button>

    <div class="input-group">
        <div><label>Name</label><input type="text" id="name" placeholder="Full Name"></div>
        <div><label>Mobile</label><input type="text" id="mobile" placeholder="Mobile Number"></div>
        <div><label>Village</label><input type="text" id="village" placeholder="Village Name"></div>
        <div><label>Date</label><input type="date" id="date"></div>
        <div><label>Start Time</label><input type="time" id="timeStart"></div>
        <div><label>Close Time</label><input type="time" id="timeClose"></div>
        <div><label>Amount (₹)</label><input type="number" id="amount" placeholder="0.00"></div>
        <button onclick="addOrUpdateRow()" id="addBtn" class="btn-main">Add Entry</button>
    </div>

    <div class="filter-section">
        <strong>Quick Search:</strong>
        <input type="text" id="filterInput" onkeyup="filterTable()" placeholder="Search Name, Mobile, or Village..." style="width: 350px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Village</th>
                <th>Date</th>
                <th>Start</th>
                <th>Close</th>
                <th>Total Time</th>
                <th>Amount (₹)</th>
                <th class="no-print">Actions</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="summary-bar">
        Grand Total: <span class="grand-total">₹<span id="grandTotal">0.00</span></span>
    </div>
</div>
