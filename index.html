<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Kraha - Final Ultimate Tracker</title>
    <style>
        :root { 
            --primary: #007bff; 
            --success: #28a745; 
            --warning: #ffc107; 
            --danger: #dc3545; 
            --dark: #343a40; 
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #eef2f7; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Print logic */
        @media print {
            .input-group, .filter-section, .actions, .btn-print, h2 { display: none !important; }
            body { background: white; margin: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; border: none; }
            table { width: 100%; border: 1px solid #000; font-size: 11px; }
            th, td { border: 1px solid #000 !important; padding: 6px; }
            .summary-bar { background: #333 !important; color: white !important; -webkit-print-color-adjust: exact; margin-top: 10px; }
        }

        h2 { text-align: center; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        
        .input-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 12px; margin-bottom: 20px; padding: 20px; background: var(--light); border-radius: 8px; border: 1px solid #ddd;
        }
        label { font-size: 0.8rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn-main { background: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 22px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; }

        .btn-print { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; margin-bottom: 10px; }

        .filter-section { margin: 20px 0; display: flex; align-items: center; gap: 10px; padding: 10px; background: #fff; border-radius: 5px; border: 1px solid #eee; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background: var(--primary); color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        
        .summary-bar { margin-top: 20px; padding: 15px; background: var(--dark); color: white; border-radius: 8px; text-align: right; font-size: 1.3rem; }
        .grand-total { font-weight: bold; color: #50fa7b; margin-left: 10px; }

        .actions { display: flex; gap: 5px; }
        .btn-edit { background: var(--warning); border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Tracker (Village + Mobile + Print)</h2>

    <button onclick="window.print()" class="btn-print">⎙ Print Report</button>

    <div class="input-group">
        <div><label>Name</label><input type="text" id="name" placeholder="Name"></div>
        <div><label>Mobile</label><input type="text" id="mobile" placeholder="Mobile"></div>
        <div><label>Village</label><input type="text" id="village" placeholder="Village"></div>
        <div><label>Date</label><input type="date" id="date"></div>
        <div><label>Start Time</label><input type="time" id="timeStart"></div>
        <div><label>Close Time</label><input type="time" id="timeClose"></div>
        <div><label>Amount (₹)</label><input type="number" id="amount" placeholder="0.00"></div>
        <button onclick="addOrUpdateRow()" id="addBtn" class="btn-main">Add Entry</button>
    </div>

    <div class="filter-section">
        <strong>Filter:</strong>
        <input type="text" id="filterInput" onkeyup="filterTable()" placeholder="Search Name, Mobile, or Village..." style="width: 350px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Village</th>
                <th>Date</th>
                <th>Start</th>
                <th>Close</th>
                <th>Total Time</th>
                <th>Amount (₹)</th>
                <th class="actions">Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="summary-bar">
        Grand Total: <span class="grand-total">₹<span id="grandTotal">0.00</span></span>
    </div>
</div>

<script>
    let editRow = null;
    // Naya URL yahan update kar diya hai
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwjk20hzscZrut6bQJwV0Gqm0HVZBXe47-7o6egvgsIllkdZXcQ4_2-pCqYmF0K5SSC/exec";

    function calculateDuration(s, e) {
        if (!s || !e) return "0h 0m";
        let start = new Date("2000/01/01 " + s);
        let end = new Date("2000/01/01 " + e);
        let diff = end - start;
        if (diff < 0) diff += 86400000;
        let hours = Math.floor(diff / 3600000);
        let mins = Math.floor((diff % 3600000) / 60000);
        return `${hours}h ${mins}m`;
    }

    async function addOrUpdateRow() {
        const data = {
            name: document.getElementById('name').value,
            mobile: document.getElementById('mobile').value,
            village: document.getElementById('village').value,
            date: document.getElementById('date').value,
            timeStart: document.getElementById('timeStart').value,
            timeClose: document.getElementById('timeClose').value,
            amount: parseFloat(document.getElementById('amount').value) || 0,
            duration: calculateDuration(document.getElementById('timeStart').value, document.getElementById('timeClose').value)
        };

        if (!data.name || isNaN(data.amount)) return alert("Fill Name and Amount!");

        // Google Sheet Connection
        fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => console.log("Data Sent"))
        .catch(err => console.error(err));

        if (editRow) {
            editRow.cells[0].innerText = data.name;
            editRow.cells[1].innerText = data.mobile;
            editRow.cells[2].innerText = data.village;
            editRow.cells[3].innerText = data.date;
            editRow.cells[4].innerText = data.timeStart;
            editRow.cells[5].innerText = data.timeClose;
            editRow.cells[6].innerText = data.duration;
            editRow.cells[7].innerText = data.amount.toFixed(2);
            editRow = null;
            document.getElementById('addBtn').innerText = "Add Entry";
            document.getElementById('addBtn').style.background = "var(--success)";
        } else {
            const row = document.getElementById('dataTable').querySelector('tbody').insertRow();
            row.innerHTML = `<td>${data.name}</td><td>${data.mobile}</td><td>${data.village}</td><td>${data.date}</td><td>${data.timeStart}</td><td>${data.timeClose}</td><td>${data.duration}</td><td>${data.amount.toFixed(2)}</td>
            <td class="actions"><button class="btn-edit" onclick="startEdit(this)">Edit</button><button class="btn-del" onclick="deleteRow(this)">Del</button></td>`;
        }
        updateTotal();
        ['name','mobile','village','date','timeStart','timeClose','amount'].forEach(id => document.getElementById(id).value = '');
    }

    function startEdit(btn) {
        editRow = btn.parentElement.parentElement;
        document.getElementById('name').value = editRow.cells[0].innerText;
        document.getElementById('mobile').value = editRow.cells[1].innerText;
        document.getElementById('village').value = editRow.cells[2].innerText;
        document.getElementById('date').value = editRow.cells[3].innerText;
        document.getElementById('timeStart').value = editRow.cells[4].innerText;
        document.getElementById('timeClose').value = editRow.cells[5].innerText;
        document.getElementById('amount').value = editRow.cells[7].innerText;
        document.getElementById('addBtn').innerText = "Update Row";
        document.getElementById('addBtn').style.background = "var(--primary)";
    }

    function deleteRow(btn) { if(confirm("Delete Row?")) { btn.parentElement.parentElement.remove(); updateTotal(); } }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('tbody tr').forEach(r => total += parseFloat(r.cells[7].innerText) || 0);
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function filterTable() {
        let q = document.getElementById('filterInput').value.toUpperCase();
        document.querySelectorAll('tbody tr').forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none";
        });
    }
</script>
</body>
</html>
