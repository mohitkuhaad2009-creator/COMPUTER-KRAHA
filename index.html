<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Kraha - Cloud Sync Tracker</title>
    <style>
        :root { 
            --primary: #007bff; --success: #28a745; --warning: #ffc107; 
            --danger: #dc3545; --dark: #343a40; --light: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #eef2f7; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        @media print {
            .input-group, .filter-section, .actions, .btn-print, h2, .history-header, .loading { display: none !important; }
            body { background: white; margin: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; border: none; }
            table { width: 100%; border: 1px solid #000; font-size: 11px; }
            th, td { border: 1px solid #000 !important; padding: 6px; }
        }

        h2, .history-header { text-align: center; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        .input-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 12px; margin-bottom: 20px; padding: 20px; background: var(--light); border-radius: 8px; border: 1px solid #ddd;
        }
        label { font-size: 0.8rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: var(--success); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 22px; }
        .btn-print { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
        .filter-section { margin: 20px 0; display: flex; align-items: center; gap: 10px; padding: 10px; background: #fff; border-radius: 5px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .summary-bar { margin-top: 20px; padding: 15px; background: var(--dark); color: white; border-radius: 8px; text-align: right; font-size: 1.3rem; }
        .grand-total { font-weight: bold; color: #50fa7b; margin-left: 10px; }
        .loading { text-align: center; color: var(--primary); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Entry</h2>
    <button onclick="window.print()" class="btn-print">⎙ Print History</button>

    <div class="input-group">
        <div><label>Name</label><input type="text" id="name"></div>
        <div><label>Mobile</label><input type="text" id="mobile"></div>
        <div><label>Village</label><input type="text" id="village"></div>
        <div><label>Date</label><input type="date" id="date"></div>
        <div><label>Start</label><input type="time" id="timeStart"></div>
        <div><label>Close</label><input type="time" id="timeClose"></div>
        <div><label>Amount (₹)</label><input type="number" id="amount"></div>
        <button onclick="saveToGoogle()" id="saveBtn" class="btn-main">Save & Sync</button>
    </div>

    <h2 class="history-header">Live Transaction History (Cloud)</h2>
    <div id="loadingStatus" class="loading">Fetching data from Google Sheets...</div>

    <div class="filter-section">
        <input type="text" id="filterInput" onkeyup="filterTable()" placeholder="Search Cloud History..." style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th><th>Mobile</th><th>Village</th><th>Date</th><th>Start</th><th>Close</th><th>Duration</th><th>Amount (₹)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="summary-bar">
        Grand Total (All Devices): <span class="grand-total">₹<span id="grandTotal">0.00</span></span>
    </div>
</div>

<script>
    // Naya URL yahan set hai
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbx_EMsj-Q0M8cd6DY2bicfiEA8UZ7jdXZBfppvrjRe7g-J5bzvJBUOdhMc87Wf8Loyp/exec";

    window.onload = fetchHistory;

    function calculateDuration(s, e) {
        if (!s || !e) return "0h 0m";
        let start = new Date("2000/01/01 " + s);
        let end = new Date("2000/01/01 " + e);
        let diff = end - start;
        if (diff < 0) diff += 86400000;
        return Math.floor(diff/3600000) + "h " + Math.floor((diff%3600000)/60000) + "m";
    }

    async function fetchHistory() {
        const loading = document.getElementById('loadingStatus');
        const tbody = document.querySelector('#dataTable tbody');
        loading.style.display = "block";
        loading.innerText = "Connecting to Google Cloud...";

        try {
            const response = await fetch(GOOGLE_URL);
            const data = await response.json();
            
            tbody.innerHTML = '';
            let total = 0;
            data.reverse().forEach(item => { // Latest entry pehle dikhane ke liye reverse
                total += parseFloat(item.amount) || 0;
                const row = tbody.insertRow();
                row.innerHTML = `<td>${item.name}</td><td>${item.mobile}</td><td>${item.village}</td><td>${item.date}</td><td>${item.timeStart}</td><td>${item.timeClose}</td><td>${item.duration}</td><td>${parseFloat(item.amount).toFixed(2)}</td>`;
            });
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            loading.style.display = "none";
        } catch (err) {
            loading.innerText = "Error loading data. Check Internet or Script URL.";
        }
    }

    async function saveToGoogle() {
        const saveBtn = document.getElementById('saveBtn');
        const entry = {
            name: document.getElementById('name').value,
            mobile: document.getElementById('mobile').value,
            village: document.getElementById('village').value,
            date: document.getElementById('date').value,
            timeStart: document.getElementById('timeStart').value,
            timeClose: document.getElementById('timeClose').value,
            amount: document.getElementById('amount').value,
            duration: calculateDuration(document.getElementById('timeStart').value, document.getElementById('timeClose').value)
        };

        if (!entry.name || !entry.amount) return alert("Fill Name and Amount!");

        saveBtn.innerText = "Saving...";
        saveBtn.disabled = true;

        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        
        // Form clear karein aur history dobara load karein
        ['name','mobile','village','date','timeStart','timeClose','amount'].forEach(id => document.getElementById(id).value = '');
        saveBtn.innerText = "Save & Sync";
        saveBtn.disabled = false;
        fetchHistory(); 
    }

    function filterTable() {
        let q = document.getElementById('filterInput').value.toUpperCase();
        document.querySelectorAll('tbody tr').forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none";
        });
    }
</script>
</body>
</html>
