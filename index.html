<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Kraha - Tracker</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #eef2f7; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--dark); margin-bottom: 25px; border-bottom: 2px solid var(--primary); display: inline-block; width: 100%; padding-bottom: 10px; }

        /* Input Layout */
        .input-group { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
            padding: 20px;
            background: var(--light);
            border-radius: 8px;
        }

        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn-main { background-color: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; height: 42px; margin-top: 22px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.8; }

        /* Filter Section */
        .filter-section { margin: 20px 0; display: flex; align-items: center; gap: 10px; }
        .filter-input { max-width: 300px; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background-color: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* Action Buttons */
        .actions { display: flex; gap: 5px; }
        .btn-edit { background: var(--warning); border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }

        /* Summary Box */
        .summary-bar { 
            margin-top: 20px; 
            padding: 15px; 
            background: var(--dark); 
            color: white; 
            border-radius: 8px; 
            display: flex; 
            justify-content: flex-end; 
            font-size: 1.2rem; 
        }
        .grand-total { font-weight: bold; color: #50fa7b; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Project Management Tracker</h2>

    <div class="input-group">
        <div>
            <label>Name</label>
            <input type="text" id="name" placeholder="Client/Task Name">
        </div>
        <div>
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <div>
            <label>Time Start</label>
            <input type="time" id="timeStart">
        </div>
        <div>
            <label>Time Close</label>
            <input type="time" id="timeClose">
        </div>
        <div>
            <label>Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00">
        </div>
        <button onclick="addOrUpdateRow()" id="addBtn" class="btn-main">Add Entry</button>
    </div>

    <div class="filter-section">
        <strong>Filter by Name:</strong>
        <input type="text" id="filterInput" class="filter-input" onkeyup="filterTable()" placeholder="Type a name...">
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Time Start</th>
                <th>Time Close</th>
                <th>Total Time</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="summary-bar">
        Total Amount: <span class="grand-total">$<span id="grandTotal">0.00</span></span>
    </div>
</div>

<script>
    let editRow = null;

    // Helper: Calculate duration between two times
    function calculateDuration(start, end) {
        if (!start || !end) return "0h 0m";
        let s = start.split(':');
        let e = end.split(':');
        let startDate = new Date(0, 0, 0, s[0], s[1], 0);
        let endDate = new Date(0, 0, 0, e[0], e[1], 0);
        let diff = endDate.getTime() - startDate.getTime();
        
        if (diff < 0) diff += 86400000; // Correct for midnight crossing

        let hours = Math.floor(diff / 1000 / 60 / 60);
        let mins = Math.floor((diff / 1000 / 60) % 60);
        return `${hours}h ${mins}m`;
    }

    // Main Logic: Add or Update
    function addOrUpdateRow() {
        const name = document.getElementById('name').value;
        const date = document.getElementById('date').value;
        const start = document.getElementById('timeStart').value;
        const close = document.getElementById('timeClose').value;
        const amountValue = document.getElementById('amount').value;
        const amount = parseFloat(amountValue) || 0;
        const duration = calculateDuration(start, close);

        if (!name || amountValue === "") {
            alert("Please provide at least a Name and Amount.");
            return;
        }

        if (editRow) {
            // Update the existing row
            editRow.cells[0].innerText = name;
            editRow.cells[1].innerText = date;
            editRow.cells[2].innerText = start;
            editRow.cells[3].innerText = close;
            editRow.cells[4].innerText = duration;
            editRow.cells[5].innerText = amount.toFixed(2);
            
            // Reset Button
            editRow = null;
            document.getElementById('addBtn').innerText = "Add Entry";
            document.getElementById('addBtn').style.backgroundColor = "#28a745";
        } else {
            // Create a new row
            const tableBody = document.getElementById('dataTable').querySelector('tbody');
            const row = tableBody.insertRow();
            row.innerHTML = `
                <td>${name}</td>
                <td>${date}</td>
                <td>${start}</td>
                <td>${close}</td>
                <td>${duration}</td>
                <td>${amount.toFixed(2)}</td>
                <td class="actions">
                    <button class="btn-edit" onclick="startEdit(this)">Edit</button>
                    <button class="btn-del" onclick="deleteRow(this)">Del</button>
                </td>
            `;
        }

        updateGrandTotal();
        clearInputs();
    }

    // Load data into inputs to edit
    function startEdit(btn) {
        editRow = btn.parentElement.parentElement;
        document.getElementById('name').value = editRow.cells[0].innerText;
        document.getElementById('date').value = editRow.cells[1].innerText;
        document.getElementById('timeStart').value = editRow.cells[2].innerText;
        document.getElementById('timeClose').value = editRow.cells[3].innerText;
        document.getElementById('amount').value = editRow.cells[5].innerText;
        
        document.getElementById('addBtn').innerText = "Update Entry";
        document.getElementById('addBtn').style.backgroundColor = "#007bff";
        window.scrollTo(0, 0); // Scroll up to the form
    }

    function deleteRow(btn) {
        if(confirm("Delete this entry?")) {
            btn.parentElement.parentElement.remove();
            updateGrandTotal();
        }
    }

    function updateGrandTotal() {
        let rows = document.getElementById('dataTable').querySelectorAll('tbody tr');
        let total = 0;
        rows.forEach(row => {
            total += parseFloat(row.cells[5].innerText) || 0;
        });
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function clearInputs() {
        ['name', 'date', 'timeStart', 'timeClose', 'amount'].forEach(id => {
            document.getElementById(id).value = '';
        });
    }

    function filterTable() {
        const query = document.getElementById('filterInput').value.toUpperCase();
        const rows = document.getElementById('dataTable').querySelectorAll('tbody tr');
        rows.forEach(row => {
            const nameCell = row.cells[0].innerText.toUpperCase();
            row.style.display = nameCell.includes(query) ? "" : "none";
        });
    }
</script>

</body>
</html>
